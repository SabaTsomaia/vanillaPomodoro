<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINIMAL.</title>
    <link rel="stylesheet" href="src/css/global.css">
    <link rel="stylesheet" href="src/css/header.css">
</head>
<body>
  
  <!-- Header -->
  <header class="header">
    <div class="header-container">
        <a href="/" class="logo">
            <span class="logo-dot"></span>
            <span>MINIMAL</span>
        </a>
        <nav class="header-nav">
            <ul>
                <li><a href="index.html" class="active">TIMER</a></li>
                <li><a href="tasks.html">TASKS</a></li>
                <li><a href="settings.html">SETTINGS</a></li>
            </ul>
        </nav>
    </div>
  </header>

  <!-- BODY -->
  <main>
    <section id="timer-section">
      <!-- The clock and buttons -->
      
    <div class="clock-container">
       <div class="switch-btn">WORK</div>
       <div class="switch-btn">SHORT BREAK</div>
       <div class="switch-btn">LONG BREAK</div>
    </div>

    <div class="clock">
          <span id="minutes">25</span>:<span id="seconds">00</span>
    </div>


    <div class="control-buttons">
        <button id="reset-btn">Reset</button>
        <button id="tgl-start-stop-btn">Start</button>
        <button id="skip-btn">Skip</button>
    </div>

    <div class="stats-bar">
        <div class="stats-item">
            <span id="pomodoro-count">0</span>
            <span class="stats-label">Today's sessions</span>
        </div>
        <div class="stats-item">
            <span id="total-time">0m</span>
            <span class="stats-label">Daily Goal</span>
        </div>
        <div class="stats-item">
            <span id="total-time">0m</span>
            <span class="stats-label">Daily Goal</span>
        </div>
    </div>

    </section>
  </main>

  <!-- FOOTER -->
  <footer>
  </footer>

</body>
</html>
